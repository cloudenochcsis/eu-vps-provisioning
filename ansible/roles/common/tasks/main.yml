---
# Baseline hardening: matches the brief's "UFW: only 80, 443, SSH from specified IPs".

- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ timezone }}"

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - curl
      - git
      - htop
      - ca-certificates
    state: present

- name: Create non-root sudo user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: sudo
    shell: /bin/bash
    create_home: true

- name: Install authorized key for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    state: present
    key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/meridian_ed25519.pub') }}"

# --- SSH hardening ---
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Disable SSH password authentication (key-only)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: restart ssh

# --- UFW: default deny, allow only 80/443 + SSH from specified IPs ---
- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH only from specified admin CIDRs
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ allowed_ssh_cidrs }}"

- name: Allow HTTP and HTTPS from anywhere
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled

# --- Automatic security updates ---
- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Ensure fail2ban running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
