---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker Engine + Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true

- name: Create compose directory
  ansible.builtin.file:
    path: /opt/meridian
    state: directory
    owner: "{{ admin_user }}"
    mode: "0750"

- name: Copy docker-compose stack
  ansible.builtin.copy:
    src: ../../compose/docker-compose.services.yml
    dest: /opt/meridian/docker-compose.yml
    owner: "{{ admin_user }}"
    mode: "0640"

- name: Bring up the services stack
  community.docker.docker_compose_v2:
    project_src: /opt/meridian
    state: present
