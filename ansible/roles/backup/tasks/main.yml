---
# Daily encrypted Restic backups from app + services servers to the Hetzner box.

- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present

- name: Create restic config dir
  ansible.builtin.file:
    path: /etc/restic
    state: directory
    mode: "0700"

- name: Deploy restic environment file
  ansible.builtin.template:
    src: restic-env.j2
    dest: /etc/restic/restic.env
    mode: "0600"

- name: Deploy backup script
  ansible.builtin.copy:
    src: backup.sh
    dest: /usr/local/bin/meridian-backup.sh
    mode: "0750"

- name: Initialise restic repo (idempotent)
  ansible.builtin.shell: |
    set -a; source /etc/restic/restic.env; set +a
    restic snapshots >/dev/null 2>&1 || restic init
  args:
    executable: /bin/bash
  changed_when: false

- name: Schedule daily backup at 02:30
  ansible.builtin.cron:
    name: "meridian daily restic backup"
    minute: "30"
    hour: "2"
    job: "/usr/local/bin/meridian-backup.sh >> /var/log/meridian-backup.log 2>&1"
