# Copy to inventory.ini and fill in your real OVHcloud / Hetzner IPs.
# Never commit the real inventory.ini (it is gitignored).

[appserver]
app.example.com ansible_host=AAA.AAA.AAA.AAA

[services]
svc.example.com ansible_host=BBB.BBB.BBB.BBB

[backup]
backup.example.com ansible_host=CCC.CCC.CCC.CCC   # Hetzner, Germany

[all:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/meridian_ed25519
ansible_python_interpreter=/usr/bin/python3
